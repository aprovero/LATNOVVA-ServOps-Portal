<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authenticating...</title>
</head>
<body>
    <script type="module">
        // MSAL v5 uses BroadcastChannel for inter-window communication.
        // This bridge ONLY broadcasts the response back to the main app and closes.
        // We use esm.sh to load the specific redirect-bridge helper for v5.
        import { broadcastResponseToMainFrame } from "https://esm.sh/@azure/msal-browser@5/redirect-bridge";
        
        try {
            console.log("Auth Bridge: Attempting to broadcast response...");
            broadcastResponseToMainFrame();
            console.log("Auth Bridge: Success. Window should close automatically.");
        } catch (error) {
            console.error("Auth Bridge: Broadcast failed:", error);
            // Fallback: If broadcasting fails, the main app might be blocked. 
            // We'll close after a short delay so the user isn't stuck.
            setTimeout(() => window.close(), 2000);
        }
    </script>
</body>
</html>
